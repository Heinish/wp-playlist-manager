<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Test — No WordPress needed</title>
    <link rel="stylesheet" href="assets/playlist.css">
    <style>
        /* ── Debug panel ─────────────────────────────────────────── */
        #debug {
            position: fixed;
            top: 12px; right: 12px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font: 13px/1.6 monospace;
            padding: 14px 18px;
            border-radius: 6px;
            z-index: 999;
            min-width: 260px;
        }
        #debug h3 { color: #fff; margin: 0 0 8px; font-size: 14px; }
        #debug .label { color: #888; }
        #debug hr { border-color: #333; margin: 8px 0; }
        #debug button {
            display: block; width: 100%; margin-top: 6px;
            padding: 6px; background: #1a1a1a; color: #fff;
            border: 1px solid #444; border-radius: 4px;
            cursor: pointer; font: inherit;
        }
        #debug button:hover { background: #2a2a2a; }
        #debug button.active-orient { background: #2271b1; border-color: #2271b1; color: #fff; }
        #debug .seq { color: #aaf; word-break: break-all; }

        /* ── Colored placeholder slides ──────────────────────────── */
        .ppm-slide .placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font: bold 48px/1.2 sans-serif;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .ppm-slide .placeholder .sub {
            font-size: 18px; font-weight: normal;
            margin-top: 10px; opacity: 0.75;
        }
    </style>
</head>
<body class="ppm-landscape">

<!-- ═══════════════════════════════════════════════════════════════
     TEST CONFIG — edit this to try different playlists
     ═══════════════════════════════════════════════════════════════ -->
<script>
    // Simulates what the WordPress admin would let you configure.
    // Each item: { label, color, frequency, duration (null = use global) }
    var TEST_ITEMS = [
        { label: 'Image A',  color: '#c0392b', frequency: 3, duration: null },
        { label: 'Image B',  color: '#2980b9', frequency: 1, duration: null    },
        { label: 'Image C',  color: '#27ae60', frequency: 1, duration: 10 },
        { label: 'Image D',  color: '#8e44ad', frequency: 2, duration: null },
    ];
    var GLOBAL_DURATION = 5;    // seconds (default when duration is null)
    var FADE_DURATION   = 2; // seconds the fade takes (try 0.3, 1.5, 2.0)
    var FADE_TYPE       = 'fade'; // 'fade', 'fade-zoom', 'none'
</script>
<!-- ═══════════════════════════════════════════════════════════════ -->

<div id="ppm-slideshow">
    <div id="ppm-splash"></div>
    <!-- slides are injected by buildTestPage() below -->
</div>

<!-- Debug panel -->
<div id="debug">
    <h3>Playlist Test</h3>
    <div><span class="label">Slide:</span> <span id="db-slide">—</span></div>
    <div><span class="label">Label:</span> <span id="db-label">—</span></div>
    <div><span class="label">Duration:</span> <span id="db-dur">—</span>s</div>
    <div><span class="label">Next in:</span> <span id="db-countdown">—</span>s</div>
    <div><span class="label">Fade type:</span> <span id="db-fade-type">—</span></div>
    <div><span class="label">Fade dur:</span> <span id="db-fade-dur">—</span>s</div>
    <hr>
    <div><span class="label">Sequence:</span><br>
        <span class="seq" id="db-seq">—</span>
    </div>
    <hr>
    <hr>
    <div><span class="label">Orientation:</span></div>
    <div style="display:flex;gap:4px;margin-top:4px;">
        <button style="flex:1" id="btn-landscape" onclick="setOrientation('landscape')" class="active-orient">&#9644; Horizontal</button>
        <button style="flex:1" id="btn-portrait"  onclick="setOrientation('portrait')">&#9646; Vertical</button>
    </div>
    <hr>
    <button onclick="simulateContentChange()">Simulate content change<br><small>(triggers auto-reload in ~30s)</small></button>
    <button onclick="window.location.reload()">Reload page</button>
</div>

<script>
/* ================================================================
   Step 1: Build the weighted sequence (replicates PHP distribute())
   ================================================================ */
function buildSequence(items, globalDuration) {
    if (!items.length) return [];

    // Build per-item slot arrays
    var slots = items.map(function(item) {
        var freq = Math.max(1, item.frequency);
        var dur  = (item.duration !== null && item.duration !== undefined)
            ? item.duration : globalDuration;
        var slot = [];
        for (var i = 0; i < freq; i++) {
            slot.push({ label: item.label, color: item.color, duration: dur });
        }
        return slot;
    });

    // Round-robin interleave (same as PHP distribute())
    var result = [];
    var maxLen = Math.max.apply(null, slots.map(function(s) { return s.length; }));
    for (var i = 0; i < maxLen; i++) {
        slots.forEach(function(s) {
            if (s[i]) result.push(s[i]);
        });
    }
    return result;
}

/* ================================================================
   Step 2: Inject slide divs into the DOM
   ================================================================ */
function buildTestPage() {
    var sequence = buildSequence(TEST_ITEMS, GLOBAL_DURATION);
    var container = document.getElementById('ppm-slideshow');

    sequence.forEach(function(slide, i) {
        var div = document.createElement('div');
        div.className = 'ppm-slide' + (i === 0 ? ' active' : '');
        div.dataset.duration = slide.duration;
        div.dataset.label    = slide.label;
        div.innerHTML = '<div class="placeholder" style="background:' + slide.color + '">'
            + slide.label
            + '<span class="sub">duration: ' + slide.duration + 's &nbsp;|&nbsp; slide ' + (i+1) + ' of ' + sequence.length + '</span>'
            + '</div>';
        container.appendChild(div);
    });

    // Show sequence summary in debug panel
    document.getElementById('db-seq').textContent =
        sequence.map(function(s, i) { return (i+1) + ':' + s.label; }).join('  ');

    return sequence;
}

var SEQUENCE = buildTestPage();

/* ================================================================
   Step 3: Mock the auto-refresh REST endpoint.
   Instead of fetching a real URL, we intercept fetch() calls
   and return a controlled hash value.
   ================================================================ */
var MOCK_HASH = 'abc123';
var CHANGED   = false;

window.PPM = {
    hash:         MOCK_HASH,
    restUrl:      'mock://playlist/hash',
    fadeDuration: FADE_DURATION,
    fadeType:     FADE_TYPE,
};

var _realFetch = window.fetch;
window.fetch = function(url, opts) {
    if (url === 'mock://playlist/hash') {
        // Return the current mock hash
        var responseHash = CHANGED ? 'xyz999' : MOCK_HASH;
        return Promise.resolve({
            json: function() {
                return Promise.resolve({ hash: responseHash });
            }
        });
    }
    return _realFetch.apply(this, arguments);
};

function simulateContentChange() {
    CHANGED = true;
    document.querySelector('#debug button').textContent
        = 'Change queued! Page will reload within 30s…';
}

/* ================================================================
   Step 4: Load the real playlist.js slideshow engine
   ================================================================ */
</script>

<!-- Load the actual playlist.js — the same file the Pi will use -->
<script src="assets/playlist.js"></script>

<!-- ================================================================
     Step 5: Debug panel — live countdown and slide info
     ================================================================ -->
<script>
(function() {
    var countdownStart = null;
    var currentDur     = null;

    function updateDebug() {
        var slides  = document.querySelectorAll('.ppm-slide');
        var active  = document.querySelector('.ppm-slide.active');
        if (!active) return;

        var idx   = Array.from(slides).indexOf(active);
        var label = active.dataset.label || '—';
        var dur   = parseInt(active.dataset.duration, 10) || GLOBAL_DURATION;

        // Detect slide change
        if (dur !== currentDur || countdownStart === null) {
            countdownStart = Date.now();
            currentDur = dur;
        }

        var elapsed   = (Date.now() - countdownStart) / 1000;
        var remaining = Math.max(0, dur - elapsed).toFixed(1);

        document.getElementById('db-slide').textContent = (idx + 1) + ' / ' + slides.length;
        document.getElementById('db-label').textContent = label;
        document.getElementById('db-dur').textContent   = dur;
        document.getElementById('db-countdown').textContent = remaining;
    }

    // Watch for active class changes (MutationObserver)
    var observer = new MutationObserver(function() {
        countdownStart = null;  // reset on slide change
    });
    document.querySelectorAll('.ppm-slide').forEach(function(s) {
        observer.observe(s, { attributes: true, attributeFilter: ['class'] });
    });

    document.getElementById('db-fade-type').textContent = FADE_TYPE;
    document.getElementById('db-fade-dur').textContent  = FADE_DURATION;

    function setOrientation(o) {
        document.body.className = 'ppm-' + o;
        document.getElementById('btn-landscape').classList.toggle('active-orient', o === 'landscape');
        document.getElementById('btn-portrait').classList.toggle('active-orient',  o === 'portrait');
    }

    setInterval(updateDebug, 100);
})();
</script>

</body>
</html>
